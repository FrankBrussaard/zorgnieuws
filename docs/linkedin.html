<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Posts - Zorgnieuws</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .linkedin-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 12px;
        }

        .post-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border-color, #ddd);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .post-meta {
            font-size: 9pt;
            color: var(--meta-color, #666);
        }

        .post-sme {
            font-weight: bold;
            color: var(--text-color, #000);
        }

        .post-score {
            background: var(--critical-bg, #fff0f0);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9pt;
            font-weight: bold;
        }

        .post-text {
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 10pt;
            padding: 12px;
            background: var(--bg-color, #f6f6ef);
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .post-source {
            font-size: 9pt;
            color: var(--meta-color, #666);
            margin-bottom: 12px;
        }

        .post-source a {
            color: var(--link-color, #0066cc);
        }

        .post-actions {
            display: flex;
            gap: 8px;
        }

        .post-actions button {
            padding: 6px 12px;
            font-size: 9pt;
            border: 1px solid var(--border-color, #ddd);
            background: var(--card-bg, #fff);
            border-radius: 4px;
            cursor: pointer;
        }

        .post-actions button:hover {
            background: var(--border-color, #eee);
        }

        .post-actions button.copied {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .date-header {
            font-size: 11pt;
            font-weight: bold;
            color: var(--meta-color, #666);
            margin: 24px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color, #ddd);
        }

        .no-posts {
            text-align: center;
            padding: 40px;
            color: var(--meta-color, #666);
        }

        .tag {
            display: inline-block;
            background: var(--border-color, #e8e8e8);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 8pt;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1>ZORGNIEUWS</h1>
        <nav>
            <a href="index.html">Alles</a>
            <a href="prio.html">Hoogste Prio</a>
            <a href="linkedin.html" class="active">LinkedIn</a>
            <a href="admin.html">Admin</a>
            <a href="settings.html">Instellingen</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
        <button class="theme-toggle" onclick="siteLogout()" title="Uitloggen">🚪</button>
    </header>

    <div class="linkedin-container">
        <h2 style="margin-bottom: 8px;">LinkedIn Posts</h2>
        <p style="color: var(--meta-color); margin-bottom: 20px;">
            Automatisch gegenereerde thought leadership posts voor Accenture SMEs.
        </p>

        <div id="posts-container">
            <div class="no-posts">Laden...</div>
        </div>
    </div>

    <script>
        function formatDate(isoString) {
            const date = new Date(isoString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Vandaag';
            if (date.toDateString() === yesterday.toDateString()) return 'Gisteren';
            return date.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function copyPost(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Gekopieerd!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Kopieer post';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function loadPosts() {
            fetch('linkedin_posts.json')
                .then(r => r.json())
                .then(posts => {
                    const container = document.getElementById('posts-container');

                    if (!posts || posts.length === 0) {
                        container.innerHTML = '<div class="no-posts">Nog geen LinkedIn posts gegenereerd.</div>';
                        return;
                    }

                    // Group by date
                    const grouped = {};
                    posts.forEach(post => {
                        const date = post.generated_at?.split('T')[0] || 'Onbekend';
                        if (!grouped[date]) grouped[date] = [];
                        grouped[date].push(post);
                    });

                    let html = '';
                    Object.keys(grouped).sort().reverse().forEach(date => {
                        const displayDate = formatDate(date + 'T00:00:00');
                        html += `<div class="date-header">${displayDate}</div>`;

                        grouped[date].forEach(post => {
                            const tags = (post.article_tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                            html += `
                                <div class="post-card">
                                    <div class="post-header">
                                        <div>
                                            <div class="post-sme">📝 ${post.sme_name || 'Expert'}</div>
                                            <div class="post-meta">${tags}</div>
                                        </div>
                                        <div class="post-score">Score: ${post.article_score || 0}</div>
                                    </div>
                                    <div class="post-text">${post.post_text || ''}</div>
                                    <div class="post-source">
                                        Bron: <a href="${post.article_url || '#'}" target="_blank">${post.article_title || 'Artikel'}</a>
                                    </div>
                                    <div class="post-actions">
                                        <button onclick="copyPost(this, \`${(post.post_text || '').replace(/`/g, "'").replace(/\\/g, '\\\\')}\`)">Kopieer post</button>
                                        <button onclick="window.open('${post.article_url || '#'}', '_blank')">Bekijk bron</button>
                                    </div>
                                </div>
                            `;
                        });
                    });

                    container.innerHTML = html;
                })
                .catch(e => {
                    console.error('Failed to load posts:', e);
                    document.getElementById('posts-container').innerHTML =
                        '<div class="no-posts">Kon posts niet laden. Run eerst de LinkedIn generator.</div>';
                });
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>

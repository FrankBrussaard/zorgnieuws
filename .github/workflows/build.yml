name: Build Zorgnieuws

on:
  schedule:
    # Dagelijks om 06:00 CET (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'collectors/**'
      - 'scorer/**'
      - 'generator/**'
      - 'config/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache scored articles - key is constant to always restore previous scores
      - name: Restore scored articles cache
        uses: actions/cache@v4
        with:
          path: data/scored.json
          key: scored-articles-cache
          restore-keys: scored-articles-cache

      - name: Create data directory
        run: mkdir -p data

      - name: Run collectors
        run: python scripts/run_collectors.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run AI scorer (only new articles)
        run: python scripts/run_scorer.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8

      - name: Build static site
        run: python generator/build_site.py

      # Save scored.json for next run
      - name: Save scored articles cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/scored.json
          key: scored-articles-cache

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
